<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Выбор времени</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="app">
      <section>
        <h2>Ближайшие слоты</h2>
        <div id="quick-slots" class="quick-slots" aria-live="polite"></div>
      </section>

      <section class="calendar-section">
        <header class="calendar-header">
          <button id="prev-month" class="icon-btn" aria-label="Предыдущий месяц">←</button>
          <h2 id="month-label"></h2>
          <button id="next-month" class="icon-btn" aria-label="Следующий месяц">→</button>
        </header>
        <div class="weekdays" aria-hidden="true">
          <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
        </div>
        <div id="calendar-grid" class="calendar-grid" aria-live="polite"></div>
      </section>

      <section>
        <h2 id="slots-title">Выберите день</h2>
        <div id="day-slots" class="day-slots"></div>
      </section>

      <footer class="confirm-wrap">
        <button id="confirm-btn" class="confirm-btn" hidden disabled>Подтвердить запись</button>
      </footer>
    </main>
    <script src="./app.js" defer></script>
  </body>
</html>
